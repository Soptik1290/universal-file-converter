services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - tmp_data:/tmp/converter
    environment:
      - MAX_FILE_SIZE=104857600
      - CLEANUP_INTERVAL_SECONDS=3600
      - TESSERACT_LANGUAGES=ces+eng+deu
      - ALLOWED_ORIGINS=http://localhost:3000

volumes:
  tmp_data:
